id: P0.13d
title: "OpenStock streaming fetch for minute-level data"
state: complete
scope:
  allowed_paths:
    - openspec/changes/openstock-data-consumption-p0-13d/**
    - src/sources/openstock_client.rs
    - src/cli/commands/data.rs
    - src/cli/handlers/openstock_handler.rs
    - src/cli/handlers/app_shell.rs
    - tests/openstock_live_minute_klines.rs
    - tests/openstock_live_minute_share.rs
    - docs/superpowers/specs/2026-07-03-openstock-p0-13d-streaming-design.md
    - docs/superpowers/plans/2026-07-03-openstock-p0-13d-streaming-plan.md
  forbidden_paths:
    # Scope is public signatures and wire behavior — body edits which preserve
    # the public signature and the on-wire request/response shape (INV-4A) are
    # permitted. P0.13d legitimately rewrote fetch_minute_* bodies as chunked
    # dispatchers behind the same public signature, and added chunk_range_weekly
    # to src/data/models.rs (spec-mandated).
    - src/db/**
    - src/backtest/**
    - src/execution/**
    - src/sources/openstock.rs
    - src/sources/openstock_shadow.rs
    - src/sources/kline_aggregator.rs
    # P0.13a/b/c frozen surfaces — batch API public signatures must remain unchanged (INV-4A)
    - src/sources/openstock_client.rs::fetch_minute_klines::signature
    - src/sources/openstock_client.rs::fetch_minute_share::signature
    - src/sources/openstock_client.rs::fetch_minute_share_single::signature
linked_openspec: openstock-data-consumption-p0-13d
started: "2026-07-03"
acceptance_gates:
  - cargo fmt --all -- --check
  - cargo clippy --all-targets --workspace -- -D warnings
  - cargo test --workspace
  - openspec validate openstock-data-consumption-p0-13d --strict
  - openspec validate --all --strict
non_goals:
  - "Server-side pagination protocol (none exists; this slice does not invent one)"
  - "ClickHouse batch inserts from stream (separate slice)"
  - "Backpressure / flow control (Vec<T> per batch is the natural unit)"
  - "Refactor batch API to stream.collect (D6 rejected — causes P0.13a/b/c churn)"
  - "Streaming for other fetchers (daily klines, index, etc.) — separate slice"
  - "klines retry (R4 follow-up; candidate for P0.13e)"
  - "P0.13c §13 R6 (server-side MINUTE_DATA range) — blocked on OpenStock server"
