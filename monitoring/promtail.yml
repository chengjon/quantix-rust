# Promtail 配置文件

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker 容器日志
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          cluster: quantix
          environment: production

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: '(?P<container_name>[^_]+)_[^_]+_[^_]+(?P<container_id>[a-f0-9]+)'
          source: tag
      - labels:
          stream:
          container_name:
          container_id:

  # 系统日志
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: systemlogs
          __path__: /var/log/**/*.log

    pipeline_stages:
      - regex:
          expression: '(?P<level>ERROR|WARN|INFO|DEBUG)'
      - labels:
          level:

  # Quantix 应用日志
  - job_name: quantix
    static_configs:
      - targets:
          - localhost
        labels:
          job: quantix
          __path__: /app/logs/*.log

    pipeline_stages:
      # 解析 JSON 格式的日志
      - json:
          expressions:
            timestamp: timestamp
            level: level
            target: target
            message: message
            span_id: span_id
            trace_id: trace_id

      # 提取时间戳
      - timestamp:
          source: timestamp
          format: RFC3339

      # 提取标签
      - labels:
          level:
          target:

      # 解析 structured fields
      - json:
          expressions:
            query:
            duration_ms:
            user_id:
            request_id:
          source: message

  # PostgreSQL 日志
  - job_name: postgres
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          __path__: /var/log/postgresql/*.log

    pipeline_stages:
      - regex:
          expression: 'ERROR:|FATAL:|PANIC:'
      - labels:
          level: error
