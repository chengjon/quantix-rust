name: Cleanup Old Docker Images

# 每周日凌晨3点运行
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  GH_REPO: ${{ github.repository }}
  DOCKER_REPO: ghcr.io/${{ github.repository }}

jobs:
  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old images
        run: |
          echo "Cleaning up images older than 30 days..."

          # 获取所有镜像标签
          ALL_TAGS=$(gh api \
            /repos/${GH_REPO}/packages \
            | jq -r '.[] | select(.name | contains("quantix")) | .id')

          # 删除30天前的未使用镜像
          for pkg_id in $ALL_TAGS; do
            echo "Checking package: $pkg_id"

            # 获取包的所有版本
            VERSIONS=$(gh api \
              "/repos/${GH_REPO}/packages/$pkg_id/versions" \
              --jq '.[] | select(.created_at | fromdateiso8601TZ < (now - 30days)) | .id')

            for ver_id in $VERSIONS; do
              echo "Deleting version: $ver_id"
              gh api \
                --method DELETE \
                "/repos/${GH_REPO}/packages/$pkg_id/versions/$ver_id" \
                || true
            done
          done

          echo "Cleanup completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create cleanup summary
        if: always()
        run: |
          echo "## Docker Image Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Run time: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Completed" >> $GITHUB_STEP_SUMMARY
