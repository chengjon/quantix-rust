name: Cleanup Old Docker Images

# 每周日凌晨3点运行
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  GH_REPO: ${{ github.repository }}
  DOCKER_REPO: ghcr.io/${{ github.repository }}
  DOCKER_IMAGE: quantix

jobs:
  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old images
        run: |
          echo "Cleaning up images older than 30 days..."

          REPO_NAME="${GH_REPO#*/}"
          CUTOFF="$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)"

          PACKAGES_JSON="$(gh api "/repos/${GH_REPO}/packages?package_type=container" 2>/tmp/gh-packages-error.log || true)"
          if ! echo "$PACKAGES_JSON" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "No accessible container packages for ${GH_REPO}; skipping cleanup."
            cat /tmp/gh-packages-error.log || true
            exit 0
          fi

          PACKAGE_ROWS="$(echo "$PACKAGES_JSON" | jq -r \
            --arg repo "$REPO_NAME" \
            --arg image "$DOCKER_IMAGE" \
            '.[] | select(
              (.name == $image) or
              (.name == ($repo + "/" + $image)) or
              (.name | contains($repo)) or
              (.name | contains($image))
            ) | [.id, .name] | @tsv')"

          if [ -z "$PACKAGE_ROWS" ]; then
            echo "No matching container packages found; skipping cleanup."
            exit 0
          fi

          while IFS=$'\t' read -r pkg_id pkg_name; do
            [ -n "$pkg_id" ] || continue
            [ -n "$pkg_name" ] || continue
            echo "Checking package: $pkg_name"

            VERSIONS_JSON="$(gh api "/repos/${GH_REPO}/packages/$pkg_id/versions" 2>/tmp/gh-versions-error.log || true)"
            if ! echo "$VERSIONS_JSON" | jq -e 'type == "array"' >/dev/null 2>&1; then
              echo "Could not list versions for ${pkg_name}; skipping package."
              cat /tmp/gh-versions-error.log || true
              continue
            fi

            VERSIONS="$(echo "$VERSIONS_JSON" | jq -r --arg cutoff "$CUTOFF" '.[] | select(.created_at < $cutoff) | .id')"
            if [ -z "$VERSIONS" ]; then
              echo "No versions older than 30 days for ${pkg_name}."
              continue
            fi

            for ver_id in $VERSIONS; do
              echo "Deleting version: $ver_id"
              gh api \
                --method DELETE \
                "/repos/${GH_REPO}/packages/$pkg_id/versions/$ver_id" \
                || true
            done
          done <<< "$PACKAGE_ROWS"

          echo "Cleanup completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create cleanup summary
        if: always()
        run: |
          echo "## Docker Image Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Run time: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Completed" >> $GITHUB_STEP_SUMMARY
