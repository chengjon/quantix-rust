# AI Decision Module Configuration
# quantix-rust AI 决策模块配置

[default]
# Default LLM provider: deepseek, openai, ollama, anthropic, gemini
provider = "deepseek"

# Default model for each provider
[default.models]
deepseek = "deepseek-chat"
openai = "gpt-4o-mini"
ollama = "qwen2.5:7b"
anthropic = "claude-3-haiku-20240307"
gemini = "gemini-1.5-flash"

# DeepSeek Configuration
[deepseek]
base_url = "https://api.deepseek.com"
# API key should be set via DEEPSEEK_API_KEY environment variable
max_tokens = 4096
temperature = 0.7

# OpenAI Configuration
[openai]
base_url = "https://api.openai.com/v1"
# API key should be set via OPENAI_API_KEY environment variable
max_tokens = 4096
temperature = 0.7

# Ollama Configuration (local)
[ollama]
base_url = "http://localhost:11434"
# No API key required for local Ollama
max_tokens = 4096
temperature = 0.7

# Anthropic Configuration
[anthropic]
base_url = "https://api.anthropic.com/v1"
# API key should be set via ANTHROPIC_API_KEY environment variable
max_tokens = 4096
temperature = 0.7

# Gemini Configuration
[gemini]
base_url = "https://generativelanguage.googleapis.com/v1beta"
# API key should be set via GOOGLE_API_KEY environment variable
max_tokens = 4096
temperature = 0.7

# Decision Engine Settings
[decision]
# Default risk tolerance: conservative, moderate, aggressive
risk_tolerance = "moderate"

# Maximum position size as percentage of portfolio
max_position_pct = 10.0

# Enable/disable news analysis
include_news = false

# Analysis depth: quick, standard, deep
analysis_depth = "standard"

# Prompt template settings
[prompts]
# Template directory (relative to config dir)
template_dir = "ai_templates"

# Custom system prompts can be added here
# system_prompt_override = ""
