# Quantix CLI 默认配置

[database.tdengine]
host = "localhost"
port = 6041
database = "quantix"
username = "root"
password = "taosdata"
mode = "rest"  # "rest" or "websocket"

[database.postgresql]
host = "localhost"
port = 5432
database = "quantix"
username = "quantix"
password = "quantix"
pool_max_size = 10

[data_sources.tdx]
hosts = ["114.80.63.12", "114.80.63.13"]
port = 7709
timeout = 5000

[data_sources.akshare]
base_url = "http://localhost:8000"
rate_limit = 100

[trading]
# 交易时段定义
morning_start = "09:30:00"
morning_end = "11:30:00"
afternoon_start = "13:00:00"
afternoon_end = "15:00:00"

[task]
# 定时任务配置
enable = true
log_dir = "./logs"
pid_file = "./quantix.pid"

# ============================================================
# 通知配置 (Phase 1: 多渠道通知扩展)
# ============================================================

[notification]
# 启用的通知渠道 (log | desktop | webhook | telegram | wechat_work | feishu | discord | slack | dingtalk | pushplus)
enabled_channels = ["log"]
# 最低通知级别 (info | warning | error | critical)
min_level = "warning"
# 通知日志路径
log_path = "./logs/notifications.log"

# 静默时段 (可选，此时间段内不发送通知)
# [notification.quiet_hours]
# start = "23:00"
# end = "07:00"

# 企业微信配置
# [notification.wechat_work]
# webhook_url = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"

# 飞书配置
