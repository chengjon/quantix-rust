[package]
name = "quantix-cli"
version = "0.1.0"
edition = "2024"
description = "A股量化交易 CLI 工具 - 与 Python quantix 项目共享数据源和数据库"
authors = ["MyStocks Team"]
repository = "https://github.com/chengjon/mystocks"
license = "MIT"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive", "env"] }
dialoguer = "0.11"
indicatif = "0.17"

# Async runtime
tokio = { version = "1.35", features = ["full", "tracing"] }
tokio-cron-scheduler = "0.10"

# Database (共享连接)
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "chrono", "rust_decimal", "json", "sqlite"] }
# TDengine (通过 REST API，可选)
taos-ws = { version = "0.5", optional = true }

# HTTP (共享数据源)
reqwest = { version = "0.11", features = ["json", "cookies"] }

# Serialization (与 Python 兼容)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Time & Math (与 Python 兼容)
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1.33", features = ["serde", "db-tokio-postgres"] }
ndarray = { version = "0.15", optional = true }

# Data (共享文件格式)
arrow = { version = "53", features = ["json"] }
parquet = { version = "53", features = ["async"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Config
config = "0.13"
dotenv = "0.15"

# TUI
ratatui = { version = "0.25", optional = true }
crossterm = { version = "0.27", optional = true }

# Error handling
anyhow = "1.0"
thiserror = "1.0"
color-eyre = "0.6"
async-trait = "0.1"

# TDX data source (rustdx)
rustdx-complete = "0.6.4"

[features]
default = ["postgresql", "tdengine-rest"]
postgresql = ["sqlx/postgres"]
sqlite = ["sqlx/sqlite"]
tdengine-ws = ["taos-ws"]
tdengine-rest = []
tui = ["ratatui", "crossterm"]

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"

[[bin]]
name = "quantix"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
